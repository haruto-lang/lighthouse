<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像プレビュー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">

    <section class="preview-card">
      <h2 class="preview-title">睡眠の重要性</h2>

      <div class="carousel">
        <button class="carousel-btn prev">‹</button>

        <div class="carousel-window">
          <div class="carousel-track">
            <img src="images/sample01.jpg" alt="1枚目" />
            <img src="images/sample02.jpg" alt="2枚目" />
            <img src="images/sample03.jpg" alt="3枚目" />
          </div>
        </div>

        <button class="carousel-btn next">›</button>
      </div>

      <div class="dots"></div>
    </section>


    <!-- 下に追加する場合は、この section をコピー -->
    <section class="preview-card">
      <h2 class="preview-title">栄養とコンディショニング</h2>

      <div class="carousel">
        <button class="carousel-btn prev">‹</button>

        <div class="carousel-window">
          <div class="carousel-track">
            <img src="images/sample04.jpg" alt="1枚目" />
            <img src="images/sample05.jpg" alt="2枚目" />
            <img src="images/sample06.jpg" alt="3枚目" />
          </div>
        </div>

        <button class="carousel-btn next">›</button>
      </div>

      <div class="dots"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
